<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Unordered List -->
    <ul>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
        <ul>
            <li>Sub Item 1</li>
            <li>Sub Item 2</li>
        </ul>
    </ul>

    <!-- Ordered List -->
    <ol>
        <li>First Item</li>
        <li>Second Item</li>
        <li>Third Item</li>
    </ol>
    <!-- Description list -->
    <dl>
        <dt>Term 1</dt>
        <dd>Description 1</dd>  
        <!-- description  definition   -->
        <dt>Term 2</dt>
        <dd>Description 2</dd>
    </dl>

    <!-- Table -->
    <table border="1">
        <tr>
            <th>Header 1</th>
            <th>Header 2</th>
            <th>Header 3</th>
        </tr>
        <tr>
            <td>Data 1</td>
            <td>Data 2</td>
            <td>Data 3</td>
        </tr>
        <tr>
            <td>Data 4</td>
            <td>Data 5</td>
            <td>Data 6</td>
        </tr>
    </table>
       
       
       <a href="https://www.google.com" target="_blank">
        <button style="border-radius: 5px;color: white; background-color: blue;">Click me</button>
        </a>

<br>
<br>
<br>
        <button onclick="doSomething()" style="border-radius: 5px;color: white; background-color: blue;">Click me</button>

        <p id="greeting">Hello</p>
        <script>
                    function doSomething(){
                        document.getElementById("greeting").innerText = "Button Clicked!";
                    }
        </script>

</body>
</html>
