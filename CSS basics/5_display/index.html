<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!--
display = property specifies if/how
an element is displayed

block-level = start on a new line, take up the full width available
              (h1, div, p, form, header, footer)

inline = do not start on a new line, width is limited to what is needed
         (span, a, img)
-->

<div >Div</div>  
<!-- block-level element -->
<span>Span</span>
 <!-- inline element -->
  <br>
<div id="div1">div</div>

<span id="span1">span</span>


<br>
<div class="container">
<div class="box" id="box1"><h1>Box 1</h1>
<p>Content for Box 1</p>
</div>
<div class="box" id="box2"><h1>Box 2</h1>
<p>Content for Box 2</p>
</div>
</div>
</body>
</html>
