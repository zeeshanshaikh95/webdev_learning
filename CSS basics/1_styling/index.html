<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* internal CSS  */
        body {
            background-color: black;
        }
        h1 {
            color: white;
        }
        p {
            color: red;
        }
    </style>
</head>
<body style="background-color:black">

    <!--There are three types of CSS Styling: Inline,Internal,External-->
    <h1 style="color:white">CSS Basics</h1>
    <!--Inline-->
    <p style="color:red">Lorem29 ipsum dolor sit amet consectetur adipisicing elit
    </p>
    <p style="color:blue">Lorem ipsum dolor sit amet consectetur adipisicing elit. Doloribus, voluptate.</p>
    <p style="color:green">Lorem ipsum dolor sit amet consectetur adipisicing elit. Doloribus, voluptate.</p>

    <p id="p1">This is a paragraph with an ID.</p>
    <p class="class1">This is a paragraph with a class.</p>
</body> 
</body>
</html>
